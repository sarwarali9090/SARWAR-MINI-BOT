<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>🚀 SARWAR-MINI | PAIR CODE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #050505;
      font-family: 'Poppins', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Animated Cyber Background */
    .bg-animation {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, #1a0033 0%, #050505 100%);
      z-index: -1;
    }

    .grid {
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: linear-gradient(rgba(255, 105, 180, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 105, 180, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      transform: perspective(500px) rotateX(60deg);
      bottom: -50%;
      animation: grid-move 10s linear infinite;
    }

    @keyframes grid-move {
      from { transform: perspective(500px) rotateX(60deg) translateY(0); }
      to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
    }

    .container {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 420px;
    }

    .box {
      background: rgba(15, 15, 25, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 105, 180, 0.3);
      border-radius: 25px;
      padding: 40px 25px;
      box-shadow: 0 0 50px rgba(255, 20, 147, 0.2);
      text-align: center;
      position: relative;
    }

    .bot-logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(45deg, #ff1493, #ff69b4);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px;
      box-shadow: 0 0 30px rgba(255, 20, 147, 0.6);
      animation: pulse-glow 2s infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 20, 147, 0.6); }
      50% { box-shadow: 0 0 40px rgba(255, 20, 147, 0.9); }
    }

    .bot-logo i {
      font-size: 50px;
      color: white;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      color: white;
      font-size: 28px;
      letter-spacing: 3px;
      margin-bottom: 5px;
      text-shadow: 0 0 10px #ff1493;
    }

    .tagline {
      color: #ff69b4;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 30px;
      font-weight: bold;
    }

    .input-group {
      margin-bottom: 25px;
    }

    .input-group label {
      display: block;
      color: #ccc;
      font-size: 13px;
      margin-bottom: 10px;
      text-align: left;
      padding-left: 15px;
    }

    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 105, 180, 0.2);
      padding: 15px 20px;
      border-radius: 15px;
      color: white;
      font-size: 18px;
      outline: none;
      transition: 0.3s;
      text-align: center;
      letter-spacing: 1px;
    }

    .input-field:focus {
      border-color: #ff1493;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 15px rgba(255, 20, 147, 0.3);
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(90deg, #ff1493, #ff69b4);
      color: white;
      border: none;
      padding: 15px;
      border-radius: 15px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
    }

    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(255, 20, 147, 0.6);
    }

    /* Result Styling */
    #pair-code-display {
      margin-top: 25px;
      padding: 20px;
      background: #000;
      border: 2px dashed #ff1493;
      border-radius: 15px;
      display: none;
    }

    .code-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      color: #fff;
      display: block;
      margin-bottom: 10px;
      text-shadow: 0 0 15px #ff1493;
    }

    .copy-btn {
      color: #ff69b4;
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
    }

    /* Loading Spinner */
    .loader {
      display: none;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 20, 147, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-text {
      margin-top: 20px;
      color: #666;
      font-size: 12px;
    }

    .footer-text b {
      color: #ff1493;
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <div class="grid"></div>

  <div class="container">
    <div class="box">
      <div class="bot-logo">
        <i class="fas fa-robot"></i>
      </div>
      <h1>SARWAR-MINI</h1>
      <p class="tagline">Pairing Service</p>

      <div class="input-group">
        <label>WhatsApp Number (with country code)</label>
        <input type="tel" id="number" class="input-field" placeholder="e.g. 92303xxxxxxx">
      </div>

      <button id="submit" class="btn-submit">Get Pair Code</button>

      <div class="loader" id="loader"></div>
      
      <div id="pair-code-display">
        <span class="code-text" id="code-val">- - - - - -</span>
        <span class="copy-hint" style="color: #00ff88; font-size: 12px;">✅ Code generated! Click below to copy.</span>
        <div id="copy-btn" onclick="copyCode()" class="copy-btn" style="margin-top: 10px;">COPY CODE</div>
      </div>

      <p class="footer-text">© 2026 Powered by <b>SARWAR-MD</b></p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    const submitBtn = document.getElementById("submit");
    const numInput = document.getElementById("number");
    const loader = document.getElementById("loader");
    const displayBox = document.getElementById("pair-code-display");
    const codeVal = document.getElementById("code-val");

    async function copyCode() {
      const text = codeVal.innerText;
      await navigator.clipboard.writeText(text);
      const btn = document.getElementById("copy-btn");
      btn.innerText = "COPIED!";
      btn.style.color = "#00ff88";
      setTimeout(() => {
        btn.innerText = "COPY CODE";
        btn.style.color = "#ff69b4";
      }, 2000);
    }

    submitBtn.addEventListener("click", async () => {
      const number = numInput.value.replace(/[^0-9]/g, "");
      
      if (!number || number.length < 10) {
        alert("Please enter a valid WhatsApp number!");
        return;
      }

      submitBtn.style.display = "none";
      loader.style.display = "block";
      displayBox.style.display = "none";

      try {
        const response = await axios.get(`/code?number=${number}`);
        const code = response.data.code || "ERROR";
        
        setTimeout(() => {
          loader.style.display = "none";
          displayBox.style.display = "block";
          codeVal.innerText = code;
          submitBtn.style.display = "block";
          submitBtn.innerText = "Get New Code";
        }, 1500);

      } catch (err) {
        loader.style.display = "none";
        submitBtn.style.display = "block";
        alert("Server error! Please try again later.");
      }
    });
  </script>
</body>
</html>
